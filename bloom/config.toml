# bm config

[settings]
progress_width = 24
color = true

[tasks]
order = ["brew", "cask", "amp", "yazi", "nvim", "mason", "npm"]

[clean]
whitelist = ["~/Library/Caches/com.apple.mail/*", "~/.gradle/daemon/*", "~/.m2/repository/*", "~/Library/Caches/org.R-project.R/R/renv/*", "~/Library/Caches/tealdeer/tldr-pages", "~/Library/Caches/ms-playwright*", "~/.ollama/models/*", "~/Library/Caches/com.apple.Safari/*", "~/Library/Caches/Firefox/*", "~/Library/Caches/com.nssurge.surge-mac/*", "~/Library/Application Support/com.nssurge.surge-mac/*", "~/Library/Caches/com.apple.spotlight/*", "~/Library/Caches/CloudKit/*", "~/.Trash", "~/Library/Group Containers/*.group.com.apple.configurator/**/*.ipsw", "FINDER_METADATA"]

[tasks.brew]
enabled = true
include = []
exclude = []

[tasks.cask]
enabled = true
include = []
exclude = []

[tasks.amp]
enabled = true

[tasks.yazi]
enabled = true
include = []
exclude = []

[tasks.nvim]
enabled = true
include = []
exclude = []

[tasks.mason]
enabled = true
include = []
exclude = []

[tasks.npm]
enabled = true
include = []
exclude = []
