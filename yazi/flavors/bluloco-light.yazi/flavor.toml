# vim:fileencoding=utf-8:foldmethod=marker

# : Manager {{{

[mgr]
cwd = { fg = "#1e78c2" }

# Find
find_keyword  = { fg = "#aa5d00", bold = true, italic = true, underline = true }
find_position = { fg = "#a626a4", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#2f8a00", bg = "#2f8a00" }
marker_cut      = { fg = "#b52a1d", bg = "#b52a1d" }
marker_marked   = { fg = "#1e78c2", bg = "#1e78c2" }
marker_selected = { fg = "#aa5d00", bg = "#aa5d00" }

# Count
count_copied   = { fg = "#f8f8f8", bg = "#2f8a00" }
count_cut      = { fg = "#f8f8f8", bg = "#b52a1d" }
count_selected = { fg = "#f8f8f8", bg = "#aa5d00" }

# Border
border_symbol = "│"
border_style  = { fg = "#a0a1a7" }

# : }}}


# : Indicator {{{

[indicator]
current = { reversed = true }
preview = { underline = true }
parent  = { reversed = true }

# : }}}


# : Tab {{{

[tabs]
active    = { fg = "#e5e5e5", bg = "#1e78c2", bold = true }
inactive  = { fg = "#1e78c2", bg = "#e5e5e5" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# : }}}


# : Mode {{{

[mode]

normal_main = { fg = "#f8f8f8", bg = "#9a6700", bold = true }
normal_alt  = { fg = "#9a6700", bg = "#e5e5e5" }

# Select mode
select_main = { fg = "#f8f8f8", bg = "#1e78c2", bold = true }
select_alt  = { fg = "#1e78c2", bg = "#e5e5e5" }

# Unset mode
unset_main = { fg = "#f8f8f8", bg = "#ce9887", bold = true }
unset_alt  = { fg = "#ce9887", bg = "#e5e5e5" }

# : }}}


# : Status bar {{{

[status]
# Permissions
perm_s = { fg = "#a0a1a7" }
perm_t = { fg = "#1e78c2" }
perm_r = { fg = "#aa5d00" }
perm_w = { fg = "#b52a1d" }
perm_x = { fg = "#2f8a00" }

# Progress
progress_label  = { fg = "#3b3f4c", bold = true }
progress_normal = { fg = "#9a6700", bg = "#d0d0d0" }
progress_error  = { fg = "#b52a1d", bg = "#d0d0d0" }

# : }}}


# : Confirm {{{

[confirm]
border     = { fg = "#1e78c2" }
title      = {}
body       = {}
list       = {}
btn_yes    = { fg = "#2f8a00", bold = true }
btn_no     = { fg = "#b52a1d", bold = true }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

# : }}}


# : Spot {{{

[spot]
border   = { fg = "#1e78c2" }
title    = {}
tbl_col  = { fg = "#a0a1a7" }
tbl_cell = {}

# : }}}


# : Pick {{{

[pick]
border   = { fg = "#1e78c2" }
active   = { fg = "#a626a4", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#1e78c2" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border       = { fg = "#1e78c2" }
active       = { fg = "#a626a4", bold = true }
inactive     = {}
icon_file    = ""
icon_folder  = ""
icon_command = ""

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#1e78c2" }
title   = {}
hovered = { fg = "#a626a4", bold = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#f0f0f0" }
cand            = { fg = "#1e78c2" }
rest            = { fg = "#a0a1a7" }
desc            = { fg = "#a626a4" }
separator       = "  "
separator_style = { fg = "#a0a1a7" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#1e78c2" }
run     = { fg = "#a626a4" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#e5e5e5", bg = "#3b3f4c" }

# : }}}


# : Notify {{{

[notify]
title_info  = { fg = "#2f8a00" }
title_warn  = { fg = "#aa5d00" }
title_error = { fg = "#b52a1d" }
icon_info   = ""
icon_warn   = ""
icon_error  = ""

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# VFS
	{ url = "archive://*", fg = "#a626a4" },

	# Special files
	{ url = "*", is = "orphan", bg = "#b52a1d" },
	{ url = "*", is = "exec",   fg = "#2f8a00" },

	# Images
	{ mime = "image/*", fg = "#1e78c2" },

	# Media
	{ mime = "{audio,video}/*", fg = "#aa5d00" },

	# Archives
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#a626a4" },

	# Documents
	{ mime = "application/{pdf,doc,rtf}", fg = "#2f8a00" },

	# Fallback
	{ url = "*", fg = "#3b3f4c" },
	{ url = "*/", fg = "#1e78c2" }
]

# : }}}
